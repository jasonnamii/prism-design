<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prism · Data template</title>
  <link rel="stylesheet" href="../ui_kits/prism/tokens.css" />
  <link rel="stylesheet" href="../ui_kits/prism/styles.css" />
  <link rel="stylesheet" href="../ui_kits/prism/styles-mece.css" />
  <link rel="stylesheet" href="../ui_kits/prism/styles-data.css" />
  <link rel="stylesheet" href="../ui_kits/prism/styles-viz.css" />
  <link rel="stylesheet" href="../ui_kits/prism/styles-doc.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../ui_kits/prism/image-slot.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="../ui_kits/prism/i18n.jsx"></script>
  <script type="text/babel" src="../ui_kits/prism/primitives.jsx"></script>
  <script type="text/babel" src="../ui_kits/prism/sections-marketing.jsx"></script>
  <script type="text/babel" src="../ui_kits/prism/sections-content.jsx"></script>
  <script type="text/babel" src="../ui_kits/prism/sections-data.jsx"></script>
  <script type="text/babel" src="../ui_kits/prism/sections-viz.jsx"></script>
  <script type="text/babel" src="../ui_kits/prism/sections-doc.jsx"></script>
  <script type="text/babel" src="../ui_kits/prism/sections-shapes.jsx"></script>
  <script type="text/babel">
    const { TopNav, Footer, ReadingProgress } = window.PRISM_PRIMITIVES;
    const { StatGrid, DataViz, Comparison, Timeline, Changelog } = window.PRISM_DATA;
    const { Funnel, Matrix2x2, Roadmap } = window.PRISM_VIZ;
    const { Scorecard } = window.PRISM_SHAPES;
    const { SpecsTable } = window.PRISM_CONTENT;
    const c = (window.PRISM_COPY || {}).en;

    function DataApp() {
      return (
        <>
          <ReadingProgress />
          <TopNav copy={c.nav} theme="dark" lang="en" setTheme={()=>{}} setLang={()=>{}} />
          <main id="top">
            <StatGrid copy={c.stats} />
            <DataViz copy={c.dataviz} />
            <Funnel copy={c.funnel} />
            <Scorecard copy={c.scorecard} />
            <Comparison copy={c.compare} />
            <Matrix2x2 copy={c.matrix} />
            <SpecsTable copy={c.specs} />
            <Timeline copy={c.timeline} />
            <Roadmap copy={c.roadmap} />
            <Changelog copy={c.changelog} />
          </main>
          <Footer copy={c.footer} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<DataApp />);
  </script>
</body>
</html>

<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="flex-direction:column;gap:0;padding:24px 32px;justify-content:center">
  <div class="h-eyebrow" style="margin-bottom:14px">RADIUS</div>
  <div style="display:flex;gap:14px;align-items:flex-end;flex-wrap:wrap">
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:64px;height:64px;background:var(--bg-surface);border:1px solid var(--line-medium);border-radius:6px"></div><span class="value">r-1 · 6</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:64px;height:64px;background:var(--bg-surface);border:1px solid var(--line-medium);border-radius:10px"></div><span class="value">r-2 · 10</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:64px;height:64px;background:var(--bg-surface);border:1px solid var(--line-medium);border-radius:16px"></div><span class="value">r-3 · 16</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:64px;height:64px;background:var(--bg-surface);border:1px solid var(--line-medium);border-radius:22px"></div><span class="value">r-4 · 22</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:64px;height:64px;background:var(--bg-surface);border:1px solid var(--line-medium);border-radius:28px"></div><span class="value">r-5 · 28</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px"><div style="width:104px;height:42px;background:var(--bg-surface);border:1px solid var(--line-medium);border-radius:999px"></div><span class="value">pill</span></div>
  </div>
</body></html>

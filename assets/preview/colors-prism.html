<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="flex-direction:column;gap:0;padding:24px 32px;justify-content:center">
  <div style="height:88px;border-radius:var(--r-3);background:var(--grad-prism)"></div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:14px">
    <div><div class="swatch swatch-square" style="background:#4F7DFF"></div><div class="label-mono" style="margin-top:6px">prism-1</div><div class="value">#4F7DFF</div></div>
    <div><div class="swatch swatch-square" style="background:#8C5CFF"></div><div class="label-mono" style="margin-top:6px">prism-2</div><div class="value">#8C5CFF</div></div>
    <div><div class="swatch swatch-square" style="background:#E04CC6"></div><div class="label-mono" style="margin-top:6px">prism-3</div><div class="value">#E04CC6</div></div>
    <div><div class="swatch swatch-square" style="background:#FF6A4D"></div><div class="label-mono" style="margin-top:6px">prism-4</div><div class="value">#FF6A4D</div></div>
    <div><div class="swatch swatch-square" style="background:#FFB347"></div><div class="label-mono" style="margin-top:6px">prism-5</div><div class="value">#FFB347</div></div>
    <div><div class="swatch swatch-square" style="background:#4FD1B7"></div><div class="label-mono" style="margin-top:6px">prism-6</div><div class="value">#4FD1B7</div></div>
  </div>
</body></html>

<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="padding:20px 24px;justify-content:center;align-items:center;gap:14px">
  <div style="background:#fff;border:1px solid rgba(10,10,12,.08);border-radius:22px;padding:24px;flex:1;display:flex;flex-direction:column;justify-content:space-between;min-height:160px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04)">
    <div>
      <div style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:var(--fg-tertiary)">A SINGLE TYPEFACE</div>
      <div style="font-size:24px;font-weight:700;letter-spacing: 0;line-height:1.15;margin-top:8px">Pretendard does the work,<br>so the layout doesn't have to.</div>
    </div>
    <div style="font-size:13px;color:var(--fg-secondary)">Same scale for EN and KO.</div>
  </div>
  <div style="background:#fff;border-radius:22px;padding:24px;flex:1;display:flex;flex-direction:column;justify-content:space-between;min-height:160px;color:#fff;background:#0a0a0c">
    <div>
      <div style="font-size:11px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;color:rgba(255,255,255,.5)">PRO</div>
      <div style="font-size:48px;font-weight:800;letter-spacing: 0;line-height:1;margin-top:14px">$29<span style="font-size:14px;font-weight:400;color:rgba(255,255,255,.5)">/mo</span></div>
    </div>
    <span style="font-size:11px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;align-self:flex-start;color:white;background:linear-gradient(95deg,#4F7DFF,#8C5CFF,#E04CC6,#FF6A4D);padding:4px 10px;border-radius:999px">Most popular</span>
  </div>
</body></html>

<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="padding:20px 32px;justify-content:center;align-items:center;gap:24px">
  <div class="col" style="align-items:center;gap:12px">
    <div style="width:64px;height:64px;border-radius:21px;background:linear-gradient(95deg,#4F7DFF,#8C5CFF,#E04CC6,#FF6A4D,#FFB347,#4FD1B7);display:grid;place-items:center">
      <div style="width:24px;height:24px;border-radius:50%;background:#f4f4f6"></div>
    </div>
    <span class="label-mono">light · 64px</span>
  </div>
  <div class="col" style="align-items:center;gap:12px">
    <div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(95deg,#4F7DFF,#8C5CFF,#E04CC6,#FF6A4D,#FFB347,#4FD1B7);display:grid;place-items:center">
      <div style="width:12px;height:12px;border-radius:50%;background:#f4f4f6"></div>
    </div>
    <span class="label-mono">footer · 32px</span>
  </div>
  <div class="col" style="align-items:center;gap:12px">
    <div style="width:22px;height:22px;border-radius:7px;background:linear-gradient(95deg,#4F7DFF,#8C5CFF,#E04CC6,#FF6A4D,#FFB347,#4FD1B7);display:grid;place-items:center">
      <div style="width:8px;height:8px;border-radius:50%;background:#f4f4f6"></div>
    </div>
    <span class="label-mono">topnav · 22px</span>
  </div>
  <div class="col" style="align-items:center;gap:12px;background:#0a0a0c;padding:18px 20px;border-radius:16px">
    <div style="width:32px;height:32px;border-radius:10px;background:linear-gradient(95deg,#4F7DFF,#8C5CFF,#E04CC6,#FF6A4D,#FFB347,#4FD1B7);display:grid;place-items:center">
      <div style="width:12px;height:12px;border-radius:50%;background:#000"></div>
    </div>
    <span class="label-mono" style="color:#a8a8b0">on dark</span>
  </div>
  <div class="col" style="flex:1;align-items:flex-start;gap:6px;margin-left:8px">
    <span class="h-eyebrow">BRAND MARK</span>
    <span style="font-size:14px;color:var(--fg-secondary);max-width:200px;line-height:1.4">Generated in CSS — gradient-filled rounded square with a center dot in canvas color.</span>
  </div>
</body></html>

<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>

  <div class="h-eyebrow" style="margin-bottom:14px">FORM CONTROLS</div>
  <div class="row" style="gap:12px;flex-wrap:wrap;align-items:center">
    <input placeholder="email@prism.io" style="height:44px;padding:0 16px;border-radius:10px;border:1px solid rgba(10,10,12,.14);background:#fff;font:inherit;font-size:14px;width:240px;color:#0a0a0c"/>

      <option>Theme · Light</option>
    </select>

    <label class="row" style="gap:8px;font-size:14px;color:#0a0a0c"><input type="radio" name="r" checked style="accent-color:#8C5CFF"/> EN</label>
    <label class="row" style="gap:8px;font-size:14px;color:#0a0a0c"><input type="radio" name="r" style="accent-color:#8C5CFF"/> KO</label>
  </div>
  <div class="label-mono" style="margin-top:14px">input · select · check · radio · accent-color: prism-2</div>
</body></html>

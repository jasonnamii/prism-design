<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.callout{display:flex;gap:14px;padding:18px 20px;border-radius:16px;background:#fff;border:1px solid rgba(10,10,12,.08);font-size:14px;line-height:1.5;color:#0a0a0c;align-items:flex-start}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.dot.note{background:#4F7DFF}
.dot.tip{background:#4FD1B7}
.dot.warn{background:#FFB347}
.k{font-weight:600}
.b{color:var(--fg-secondary)}
</style></head>
<body class="card" style="flex-direction:column;gap:10px;padding:18px 24px;justify-content:center">
  <div class="callout"><div class="dot note"></div><div><span class="k">Note.</span> <span class="b">Use one accent per page; the gradient is for chrome.</span></div></div>
  <div class="callout"><div class="dot tip"></div><div><span class="k">Tip.</span> <span class="b">Wrap top-level sections in &lt;Reveal&gt; for the soft scroll fade.</span></div></div>
  <div class="callout"><div class="dot warn"></div><div><span class="k">Warn.</span> <span class="b">Never apply --grad-prism to a body paragraph or large surface fill.</span></div></div>
</body></html>

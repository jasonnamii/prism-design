<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="padding:20px 28px;justify-content:center;align-items:center;gap:18px">
  <div style="font-size:84px;font-weight:800;letter-spacing: 0;line-height:1;background:linear-gradient(95deg,#4F7DFF,#8C5CFF,#E04CC6,#FF6A4D,#FFB347,#4FD1B7);-webkit-background-clip:text;background-clip:text;color:transparent">2.4×</div>
  <div class="col" style="gap:6px;flex:1">
    <span class="h-eyebrow">PRISM-TEXT</span>
    <span style="font-size:14px;color:var(--fg-secondary);max-width:300px;line-height:1.4">Gradient text-clip is reserved for KPI big numbers, accent eyebrows, and brand wordmarks. Never on body prose.</span>
  </div>
  <div class="col" style="gap:6px;align-items:flex-end">
    <span class="value">background-clip: text</span>
    <span class="value">linear-gradient 95deg</span>
    <span class="value">6 stops</span>
  </div>
</body></html>

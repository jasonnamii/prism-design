<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
table { width:100%; border-collapse:collapse; font-size:14px }
table tr { border-top:1px solid rgba(10,10,12,.08) }
table tr:last-child { border-bottom:1px solid rgba(10,10,12,.08) }
table th, table td { padding:12px 0; text-align:left; font-weight:400 }
table th { color:var(--fg-tertiary); width:38%; font-size:13px }
table td { color:var(--fg-primary); font-weight:500; font-family:var(--font-mono); font-size:13px; font-variant-numeric:tabular-nums }
</style></head>
<body class="card" style="flex-direction:column;gap:0;padding:18px 32px;justify-content:center">
  <div class="h-eyebrow" style="margin-bottom:6px">SPECS TABLE · ruled, monospace values</div>
  <table>
    <tr><th>display</th><td>3.5″ · 720 × 720 · OLED</td></tr>
    <tr><th>battery</th><td>8 hours · USB-C</td></tr>
    <tr><th>connectivity</th><td>Wi-Fi 6E · Bluetooth 5.3</td></tr>
    <tr><th>weight</th><td>248 g</td></tr>
  </table>
</body></html>

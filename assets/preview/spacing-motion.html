<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  @keyframes mlx { from {transform:scaleX(0);opacity:.4} 50%{transform:scaleX(1);opacity:1} to{transform:scaleX(0);opacity:.4} }
  .bar { height:5px;border-radius:3px;background:var(--grad-prism);transform-origin:left center;animation:mlx 2.4s var(--ease-in-out) infinite }
  .bar.fast { animation-duration:.6s }
  .bar.med { animation-duration:1.2s }
</style>
</head>
<body class="card" style="flex-direction:column;gap:0;padding:24px 32px;justify-content:center">
  <div class="h-eyebrow" style="margin-bottom:14px">MOTION · cubic-bezier(.2, .8, .2, 1)</div>
  <div class="col" style="gap:14px">
    <div class="row" style="gap:16px"><span class="label-mono" style="width:120px">fast · 180ms</span><div class="bar fast" style="flex:1"></div></div>
    <div class="row" style="gap:16px"><span class="label-mono" style="width:120px">med · 320ms</span><div class="bar med" style="flex:1"></div></div>
    <div class="row" style="gap:16px"><span class="label-mono" style="width:120px">slow · 600ms</span><div class="bar" style="flex:1"></div></div>
  </div>
  <div class="label-mono" style="margin-top:14px">no bounces · no springs · ease-out cubics only</div>
</body></html>

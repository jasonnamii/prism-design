<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="flex-direction:column;gap:0;padding:24px 32px;justify-content:center">
  <div class="h-eyebrow" style="margin-bottom:14px">SPACING SCALE · 4px base</div>
  <div style="display:flex;align-items:flex-end;gap:6px;height:80px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:4px;height:4px;background:var(--fg-primary)"></div><span class="value">1·4</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:8px;height:8px;background:var(--fg-primary)"></div><span class="value">2·8</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:12px;height:12px;background:var(--fg-primary)"></div><span class="value">3·12</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:16px;height:16px;background:var(--fg-primary)"></div><span class="value">4·16</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:24px;height:24px;background:var(--fg-primary)"></div><span class="value">5·24</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:32px;height:32px;background:var(--fg-primary)"></div><span class="value">6·32</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:48px;height:48px;background:var(--fg-primary)"></div><span class="value">7·48</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:64px;height:64px;background:var(--fg-primary)"></div><span class="value">8·64</span></div>
  </div>
  <div class="label-mono" style="margin-top:14px">9·96 · 10·128 · 11·192 · 12·256  &nbsp;//  section rhythm uses 9–11</div>
</body></html>

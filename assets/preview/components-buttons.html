<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
.btn { display:inline-flex;align-items:center;justify-content:center;gap:8px;border:1px solid transparent;border-radius:999px;font-weight:600;letter-spacing:-0.011em;font-family:inherit;cursor:pointer;transition:all 180ms cubic-bezier(.2,.8,.2,1);height:44px;padding:0 22px;font-size:14px;white-space:nowrap }
.btn-primary{background:#0a0a0c;color:#f4f4f6}
.btn-secondary{background:transparent;border-color:rgba(10,10,12,.14);color:#0a0a0c}
.btn-ghost{background:transparent;color:#0a0a0c;padding:0 8px;border:none}
.btn-prism{background:linear-gradient(95deg,#4F7DFF,#8C5CFF,#E04CC6,#FF6A4D,#FFB347,#4FD1B7);color:white;border:none}
</style></head>
<body class="card" style="flex-direction:column;gap:14px;padding:24px 32px;justify-content:center">
  <div class="row" style="gap:12px;flex-wrap:wrap">
    <button class="btn btn-primary">Get started →</button>
    <button class="btn btn-secondary">Learn more</button>
    <button class="btn btn-ghost">Skip</button>
    <button class="btn btn-prism">Start free</button>
  </div>
  <div class="row" style="gap:12px;flex-wrap:wrap;align-items:center">
    <button class="btn btn-primary" style="height:36px;padding:0 16px;font-size:13px">sm</button>
    <button class="btn btn-primary" style="height:44px;padding:0 22px;font-size:14px">md</button>
    <button class="btn btn-primary" style="height:56px;padding:0 32px;font-size:16px">lg</button>
    <span class="label-mono" style="margin-left:auto">primary · secondary · ghost · prism · sm/md/lg</span>
  </div>
</body></html>

<!doctype html><html data-theme="light"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="padding:30px 32px;justify-content:center;align-items:center;gap:24px">
  <div style="display:flex;gap:30px">
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:96px;height:64px;background:#fff;border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.04),0 2px 8px rgba(0,0,0,.04)"></div>
      <span class="value">shadow-sm</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:96px;height:64px;background:#fff;border-radius:14px;box-shadow:0 4px 16px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04)"></div>
      <span class="value">shadow-md</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:96px;height:64px;background:#fff;border-radius:14px;box-shadow:0 24px 64px rgba(0,0,0,.10),0 8px 24px rgba(0,0,0,.06)"></div>
      <span class="value">shadow-lg</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
      <div style="width:96px;height:64px;background:linear-gradient(95deg,#4F7DFF,#8C5CFF,#E04CC6,#FF6A4D,#FFB347,#4FD1B7);border-radius:14px;box-shadow:0 0 60px rgba(140,90,255,.45)"></div>
      <span class="value">shadow-glow</span>
    </div>
  </div>
</body></html>

<!doctype html><html data-theme="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body class="card" style="flex-direction:column;gap:0;padding:24px 32px;justify-content:center;background:#000">
  <div class="h-eyebrow" style="margin-bottom:12px;color:#6e6e76">DARK THEME · ACHROMATIC</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px">
    <div><div class="swatch swatch-square" style="background:#000;border:1px solid rgba(255,255,255,.1)"></div><div class="label-mono" style="margin-top:6px;color:#a8a8b0">canvas</div><div class="value" style="color:#6e6e76">#000000</div></div>
    <div><div class="swatch swatch-square" style="background:#0e0e10;border:1px solid rgba(255,255,255,.1)"></div><div class="label-mono" style="margin-top:6px;color:#a8a8b0">surface</div><div class="value" style="color:#6e6e76">#0e0e10</div></div>
    <div><div class="swatch swatch-square" style="background:#18181b;border:1px solid rgba(255,255,255,.1)"></div><div class="label-mono" style="margin-top:6px;color:#a8a8b0">elev</div><div class="value" style="color:#6e6e76">#18181b</div></div>
    <div><div class="swatch swatch-square" style="background:#a8a8b0"></div><div class="label-mono" style="margin-top:6px;color:#a8a8b0">secondary</div><div class="value" style="color:#6e6e76">#a8a8b0</div></div>
    <div><div class="swatch swatch-square" style="background:#f5f5f7"></div><div class="label-mono" style="margin-top:6px;color:#a8a8b0">primary</div><div class="value" style="color:#6e6e76">#f5f5f7</div></div>
  </div>
</body></html>
